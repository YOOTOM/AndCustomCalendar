# ╔══════════════════════════════════════════════════════════════════╗
# ║  CodeQL 정적 코드 분석 Workflow                                  ║
# ║  - 결과: GitHub Security > Code Scanning                        ║
# ║  - approval 모드: Rule ID 숨김 + HTML 대시보드 + 규칙 필터링     ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "CodeQL (ATsens Android)"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      profile:
        description: "internal | approval"
        required: true
        default: "approval"
        type: choice
        options:
          - internal
          - approval
  schedule:
    - cron: '29 14 * * 2'   # 매주 화요일 14:29 UTC (한국 23:29)

jobs:
  analyze:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: read
      packages: read
      security-events: write
      pages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:

      # ── STEP 1: 소스 코드 체크아웃 ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── STEP 2: 프로파일 결정 ──
      # 수동 실행 → 선택한 profile / 자동 실행 → approval
      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.profile }}"
          else
            PROFILE="approval"
          fi
          echo "value=$PROFILE" >> "$GITHUB_OUTPUT"
          if [ "$PROFILE" = "approval" ]; then
            echo "hide_rule_id=true" >> "$GITHUB_OUTPUT"
          else
            echo "hide_rule_id=false" >> "$GITHUB_OUTPUT"
          fi

      # ── STEP 2-1: 디버그 출력 ──
      - name: Debug selected profile
        shell: bash
        run: |
          echo "event=${{ github.event_name }} | profile=${{ steps.profile.outputs.value }} | hide_rule_id=${{ steps.profile.outputs.hide_rule_id }}"
          echo "config=./.github/codeql/codeql-config-${{ steps.profile.outputs.value }}.yml"

      # ── STEP 3: JDK 17 설치 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # ── STEP 4: Android SDK 설치 ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── STEP 5: SDK 컴포넌트 설치 (compileSdk에 맞춤) ──
      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34"

      # ── STEP 6: CodeQL 초기화 ──
      # config-file로 profile별 설정(query-filters 등) 로드
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config-${{ steps.profile.outputs.value }}.yml

      # ── STEP 7: Gradle 빌드 ──
      - name: Build (Gradle)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --no-daemon

      # ── STEP 8: CodeQL 분석 ──
      # upload: never → 디버그 확인 후 STEP 8-2에서 수동 업로드
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/${{ steps.profile.outputs.value }}/language:${{ matrix.language }}"
          output: sarif-results
          upload: never

      # ── STEP 8-1: (디버그) SARIF Rule ID 출력 ──
      # query-filters exclude가 제대로 동작했는지 로그에서 확인
      - name: Debug SARIF contents
        if: always()
        shell: bash
        run: |
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -z "$SARIF_FILE" ]; then
            echo "[Debug] No SARIF file found"
            exit 0
          fi
          echo "[Debug] SARIF file: $SARIF_FILE"
          export SARIF_FILE
          python3 << 'PYEOF'
          import json, os
          sarif_path = os.environ["SARIF_FILE"]
          with open(sarif_path) as f:
              data = json.load(f)
          for run in data.get("runs", []):
              rids = sorted(set(r.get("ruleId","(none)") for r in run.get("results",[])))
              print(f"[Debug] Rule IDs in SARIF ({len(rids)}): {rids}")
              print(f"[Debug] Total results: {len(run.get('results',[]))}")
          PYEOF

      # ── STEP 8-2: SARIF 업로드 ──
      # exclude된 규칙 → SARIF에 없음 → 이전 alert 자동 "Fixed"
      # exclude에서 뺀 규칙 → SARIF에 있음 → alert 다시 "Open"
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: "/${{ steps.profile.outputs.value }}/language:${{ matrix.language }}"

      # ── STEP 8-3: 이전 category 잔존 alert → "Fixed" 전환 ──
      # 이전에 다른 category로 올라간 alert를 빈 SARIF로 덮어 Fixed 처리
      - name: Supersede stale analyses
        if: steps.profile.outputs.value == 'approval'
        shell: bash
        run: |
          mkdir -p sarif-empty
          cat > sarif-empty/empty.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "CodeQL", "version": "0.0.0", "rules": []}}, "results": []}]
          }
          EOF

      - name: Upload empty SARIF to stale category (internal)
        if: steps.profile.outputs.value == 'approval'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: sarif-empty/empty.sarif
          category: "/internal/language:${{ matrix.language }}"

      - name: Upload empty SARIF to stale category (legacy)
        if: steps.profile.outputs.value == 'approval'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: sarif-empty/empty.sarif
          category: "/language:${{ matrix.language }}"

      # ── STEP 9: 인허가용 HTML 대시보드 ──
      # SARIF → Rule ID 없는 HTML 보고서 생성 → GitHub Pages 배포
      - name: Generate Approval Dashboard
        if: steps.profile.outputs.value == 'approval'
        shell: bash
        run: |
          mkdir -p site
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -z "$SARIF_FILE" ]; then
            echo "<h1>No SARIF results found.</h1>" > site/index.html
            exit 0
          fi

          python3 << 'PY'
          import json, os, html, datetime

          sarif_path = os.popen("find sarif-results -name '*.sarif' -type f | head -1").read().strip()
          data = json.load(open(sarif_path, encoding="utf-8"))
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          ref  = os.environ.get("GITHUB_REF_NAME", "")
          sha  = os.environ.get("GITHUB_SHA", "")[:8]
          now  = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          def sev_norm(level):
              level = (level or "").lower()
              if level == "error": return "Critical"
              if level == "warning": return "High"
              if level == "note": return "Medium"
              return "Low"

          def get_first_location(res):
              locs = res.get("locations") or []
              if not locs: return ("", "")
              pl = (locs[0].get("physicalLocation") or {})
              f = (pl.get("artifactLocation") or {}).get("uri", "") or ""
              line = ""
              region = pl.get("region") or {}
              if region.get("startLine"):
                  line = str(region["startLine"])
              return (f, line)

          items = []
          for run in data.get("runs", []):
              rules_by_id = {r.get("id"): r for r in run.get("tool", {}).get("driver", {}).get("rules", []) if isinstance(r, dict)}
              for res in run.get("results", []):
                  title = ((res.get("message") or {}).get("text") or "(no title)").splitlines()[0].strip()
                  sev = sev_norm(res.get("level", "none"))
                  f, line = get_first_location(res)
                  rid = res.get("ruleId")
                  rule = rules_by_id.get(rid, {}) if rid else {}
                  desc = ((rule.get("shortDescription") or {}).get("text") or "")
                  help_md = ((rule.get("help") or {}).get("markdown") or (rule.get("help") or {}).get("text") or "")
                  items.append({"title": title, "sev": sev, "file": f, "line": line, "desc": desc, "help": help_md})

          order = {"Critical": 0, "High": 1, "Medium": 2, "Low": 3}
          items.sort(key=lambda x: (order.get(x["sev"], 9), x["file"], x["line"]))
          counts = {}
          for it in items:
              counts[it["sev"]] = counts.get(it["sev"], 0) + 1

          def esc(s): return html.escape(s or "")

          css = """
          body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:24px;line-height:1.5}
          h1{margin:0 0 8px 0}
          .meta{color:#666;margin-bottom:16px}
          .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;margin-right:6px;border:1px solid #ddd}
          .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0 18px}
          .card{border:1px solid #e5e5e5;border-radius:12px;padding:12px}
          .k{color:#666;font-size:12px} .v{font-size:20px;font-weight:700}
          .tbl{width:100%;border-collapse:collapse;margin-top:10px}
          .tbl th,.tbl td{border-bottom:1px solid #eee;padding:10px;vertical-align:top;text-align:left}
          .small{color:#666;font-size:12px} .hr{height:1px;background:#eee;margin:18px 0}
          """

          rows = []
          for i, it in enumerate(items, 1):
              loc = it["file"] + (f":{it['line']}" if it["line"] else "")
              rec = it["help"].strip()
              if len(rec) > 1200: rec = rec[:1200] + "\n\n…(truncated)…"
              rows.append(f"""<tr>
          <td class="small">{i}</td>
          <td><span class="badge">{esc(it["sev"])}</span><b>{esc(it["title"])}</b><div class="small">{esc(it["desc"])}</div></td>
          <td><code>{esc(loc) if loc else "(n/a)"}</code></td>
          <td>{('<pre style="white-space:pre-wrap;margin:0">'+esc(rec)+'</pre>') if rec else '<span class="small">(none)</span>'}</td>
          </tr>""")

          html_out = f"""<!doctype html><html lang="en"><head><meta charset="utf-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1"/>
          <title>CodeQL Approval Dashboard</title><style>{css}</style></head><body>
          <h1>CodeQL Security Assessment</h1>
          <div class="meta">Repo: <code>{esc(repo)}</code> | Branch: <code>{esc(ref)}</code> | Commit: <code>{esc(sha)}</code> | {esc(now)}</div>
          <div class="card"><b>Note</b><div class="small">Rule IDs are intentionally hidden for regulatory submission.</div></div>
          <div class="grid">
          <div class="card"><div class="k">Total</div><div class="v">{len(items)}</div></div>
          <div class="card"><div class="k">Critical</div><div class="v">{counts.get("Critical",0)}</div></div>
          <div class="card"><div class="k">High</div><div class="v">{counts.get("High",0)}</div></div>
          <div class="card"><div class="k">Medium</div><div class="v">{counts.get("Medium",0)}</div></div>
          </div><div class="hr"></div>
          <h2>Findings</h2>
          <table class="tbl"><thead><tr><th style="width:48px">#</th><th>Issue</th><th style="width:260px">Location</th><th>Recommendation</th></tr></thead>
          <tbody>{''.join(rows) if rows else '<tr><td colspan="4">No findings detected.</td></tr>'}</tbody></table>
          </body></html>"""

          open("site/index.html", "w", encoding="utf-8").write(html_out)
          print("Generated site/index.html")
          PY

      # ── STEP 10–12: GitHub Pages 배포 ──
      - name: Configure Pages
        if: steps.profile.outputs.value == 'approval'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.profile.outputs.value == 'approval'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.profile.outputs.value == 'approval'
        id: deployment
        uses: actions/deploy-pages@v4

      # ── STEP 13: SARIF Artifact 보관 (30일) ──
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/**/*.sarif
          retention-days: 30

      # ── STEP 14: Actions Summary 출력 ──
      - name: Generate Analysis Summary
        if: always()
        shell: bash
        env:
          HIDE_RULE_ID: ${{ steps.profile.outputs.hide_rule_id }}
        run: |
          echo "## CodeQL Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ matrix.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Query Pack | security-and-quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${GITHUB_REF_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::8} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, os, sys

          hide_rule_id = os.environ.get("HIDE_RULE_ID", "false").lower() == "true"
          sarif_path = os.popen("find sarif-results -name '*.sarif' -type f | head -1").read().strip()
          if not sarif_path: sys.exit(0)
          with open(sarif_path) as f:
              data = json.load(f)

          sev = {'error': 0, 'warning': 0, 'note': 0, 'none': 0}
          rules, cwes, files = {}, set(), {}

          for run in data.get('runs', []):
              tr = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
              for res in run.get('results', []):
                  lv = res.get('level', 'none')
                  sev[lv] = sev.get(lv, 0) + 1
                  rid = res.get('ruleId', '?')
                  if not hide_rule_id:
                      rules[rid] = rules.get(rid, 0) + 1
                  for loc in res.get('locations', []):
                      u = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                      if u: files[u] = files.get(u, 0) + 1
                  ri = tr.get(rid, {})
                  for t in ri.get('properties', {}).get('tags', []):
                      if t.startswith('external/cwe/cwe-'):
                          cwes.add(t.replace('external/cwe/', '').upper())

          tot = sum(sev.values())
          unique_rules = len({res.get('ruleId', '?') for run in data.get('runs', []) for res in run.get('results', [])}) if hide_rule_id else len(rules)

          print(f'### Summary')
          print(f'> **{tot}** findings | **{len(files)}** files | **{unique_rules}** rules | **{len(cwes)}** CWEs\n')
          print('| Severity | Count | % |')
          print('|----------|-------|---|')
          for lv in ['error','warning','note','none']:
              c = sev.get(lv, 0); p = c/tot*100 if tot else 0
              print(f'| {lv.upper()} | {c} | {p:.1f}% |')
          print(f'| **Total** | **{tot}** | |\n')

          if (not hide_rule_id) and rules:
              print('### Rules (Top 20)')
              print('| # | Rule | Count |')
              print('|---|------|-------|')
              for i,(r,c) in enumerate(sorted(rules.items(), key=lambda x:-x[1])[:20],1):
                  print(f'| {i} | `{r}` | {c} |')
              print()

          if cwes:
              print(f'### CWEs ({len(cwes)})')
              for c in sorted(cwes):
                  n = c.replace('CWE-','')
                  print(f'- [{c}](https://cwe.mitre.org/data/definitions/{n}.html)')
              print()

          if files:
              print('### Top Files')
              print('| # | File | Count |')
              print('|---|------|-------|')
              for i,(f,c) in enumerate(sorted(files.items(), key=lambda x:-x[1])[:10],1):
                  print(f'| {i} | `{f.split("/")[-1]}` | {c} |')
          PYEOF
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "[Code Scanning](/${GITHUB_REPOSITORY}/security/code-scanning) | SARIF in Artifacts tab" >> $GITHUB_STEP_SUMMARY
          else
            echo "No SARIF results found." >> $GITHUB_STEP_SUMMARY
          fi

