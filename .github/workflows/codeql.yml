name: "CodeQL (ATsens)"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      profile:
        description: "internal | approval"
        required: true
        default: "approval"
        type: choice
        options:
          - internal
          - approval
  schedule:
    - cron: '29 14 * * 2' # 매주 화요일 14:29 UTC (한국 23:29)

jobs:
  analyze:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      # ── 소스 준비 ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # 수동 실행은 입력 profile 사용, 자동 실행은 approval로 고정
      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.profile }}"
          else
            PROFILE="approval"
          fi
          echo "value=$PROFILE" >> "$GITHUB_OUTPUT"

          if [ "$PROFILE" = "approval" ]; then
            echo "hide_rule_id=true" >> "$GITHUB_OUTPUT"
          else
            echo "hide_rule_id=false" >> "$GITHUB_OUTPUT"
          fi

      # 선택된 profile / 설정 파일 경로를 로그에 남겨 디버깅
      - name: Debug selected profile
        shell: bash
        run: |
          echo "event=${{ github.event_name }} | profile=${{ steps.profile.outputs.value }} | hide_rule_id=${{ steps.profile.outputs.hide_rule_id }}"
          echo "config=./.github/codeql/codeql-config-${{ steps.profile.outputs.value }}.yml"

      # ── 빌드 환경 설정 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 프로젝트 compileSdk에 맞는 Android 플랫폼 설치
      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34"

      # profile별 CodeQL 설정(query-filters 등) 적용
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config-${{ steps.profile.outputs.value }}.yml

      # manual build-mode이므로 Gradle 빌드를 직접 수행
      - name: Build (Gradle)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --no-daemon

      # SARIF만 생성하고 업로드는 다음 단계에서 수행
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/${{ steps.profile.outputs.value }}/language:${{ matrix.language }}"
          output: sarif-results
          upload: never

      # 필터링 결과가 의도대로 반영됐는지 ruleId / 결과 수 확인
      - name: Debug SARIF contents
        if: always()
        shell: bash
        run: |
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -z "$SARIF_FILE" ]; then
            echo "[Debug] No SARIF file found"
            exit 0
          fi
          echo "[Debug] SARIF file: $SARIF_FILE"
          export SARIF_FILE
          python3 << 'PYEOF'
          import json, os
          sarif_path = os.environ["SARIF_FILE"]
          with open(sarif_path) as f:
              data = json.load(f)
          for run in data.get("runs", []):
              rids = sorted(set(r.get("ruleId", "(none)") for r in run.get("results", [])))
              print(f"[Debug] Rule IDs in SARIF ({len(rids)}): {rids}")
              print(f"[Debug] Total results: {len(run.get('results', []))}")
          PYEOF

      # 현재 profile/category 기준 결과를 Code Scanning에 반영
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: "/${{ steps.profile.outputs.value }}/language:${{ matrix.language }}"

      # ── 이전 category 정리 ──
      # approval 모드에서는 과거 category 경고를 빈 SARIF로 덮어 Fixed 처리
      - name: Supersede stale analyses
        if: steps.profile.outputs.value == 'approval'
        shell: bash
        run: |
          mkdir -p sarif-empty
          cat > sarif-empty/empty.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "CodeQL", "version": "0.0.0", "rules": []}}, "results": []}]
          }
          EOF

      # 예전 internal category 정리
      - name: Upload empty SARIF to stale category (internal)
        if: steps.profile.outputs.value == 'approval'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: sarif-empty/empty.sarif
          category: "/internal/language:${{ matrix.language }}"

      # 예전 기본 category 정리
      - name: Upload empty SARIF to stale category (legacy)
        if: steps.profile.outputs.value == 'approval'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: sarif-empty/empty.sarif
          category: "/language:${{ matrix.language }}"

      # 원본 SARIF를 Artifact로 보관
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/**/*.sarif
          retention-days: 30

      # ── Actions Summary 생성 ──
      # Code Scanning과 맞추기 위해 rule + 파일 + 라인 기준으로 dedup 집계
      - name: Generate Analysis Summary
        if: always()
        shell: bash
        env:
          HIDE_RULE_ID: ${{ steps.profile.outputs.hide_rule_id }}
        run: |
          echo "## CodeQL Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ matrix.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Query Pack | security-and-quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${GITHUB_REF_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::8} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, os, sys

          hide_rule_id = os.environ.get("HIDE_RULE_ID", "false").lower() == "true"
          sarif_path = os.popen("find sarif-results -name '*.sarif' -type f | head -1").read().strip()
          if not sarif_path: sys.exit(0)
          with open(sarif_path) as f:
              data = json.load(f)

          # CodeQL rule properties에서 실제 severity를 읽음 (Code Scanning과 동일)
          def get_severity(rule_props):
              ss = rule_props.get("security-severity")
              if ss is not None:
                  try:
                      score = float(ss)
                      if score >= 9.0: return "Critical"
                      if score >= 7.0: return "High"
                      if score >= 4.0: return "Medium"
                      return "Low"
                  except (ValueError, TypeError):
                      pass

              ps = rule_props.get("problem.severity", "")
              if ps == "error":          return "Error"
              if ps == "warning":        return "Warning"
              if ps == "recommendation": return "Note"
              return "Warning"

          seen = set()
          sev = {}
          rules, cwes, files = {}, set(), {}

          for run in data.get('runs', []):
              driver_rules = run.get('tool', {}).get('driver', {}).get('rules', [])
              tr = {}
              for r in driver_rules:
                  rid_key = r.get('id')
                  if rid_key:
                      tr[rid_key] = r

              for res in run.get('results', []):
                  rid = res.get('ruleId', '?')
                  ri = tr.get(rid, {})

                  # 첫 번째 location 기준으로 파일/라인 추출
                  uri, line = '', ''
                  locs = res.get('locations', [])
                  if locs:
                      pl = locs[0].get('physicalLocation', {})
                      uri = pl.get('artifactLocation', {}).get('uri', '')
                      line = str(pl.get('region', {}).get('startLine', ''))

                  # 같은 rule + 파일 + 라인은 1건으로 집계
                  dedup_key = (rid, uri, line)
                  if dedup_key in seen:
                      continue
                  seen.add(dedup_key)

                  severity = get_severity(ri.get('properties', {}))
                  sev[severity] = sev.get(severity, 0) + 1

                  if not hide_rule_id:
                      rules[rid] = rules.get(rid, 0) + 1

                  if uri:
                      files[uri] = files.get(uri, 0) + 1

                  for t in ri.get('properties', {}).get('tags', []):
                      if t.startswith('external/cwe/cwe-'):
                          cwes.add(t.replace('external/cwe/', '').upper())

          tot = sum(sev.values())
          unique_rules = len({k[0] for k in seen})

          print(f'### Summary')
          print(f'> **{tot}** findings | **{len(files)}** files | **{unique_rules}** rules | **{len(cwes)}** CWEs\n')
          print('| Severity | Count | % |')
          print('|----------|-------|---|')
          sev_order = ['Critical', 'High', 'Error', 'Medium', 'Warning', 'Low', 'Note']
          for sv in sev_order:
              c = sev.get(sv, 0)
              if c == 0:
                  continue
              p = c / tot * 100 if tot else 0
              print(f'| {sv} | {c} | {p:.1f}% |')
          print(f'| **Total** | **{tot}** | |\n')

          if (not hide_rule_id) and rules:
              print('### Rules (Top 20)')
              print('| # | Rule | Count |')
              print('|---|------|-------|')
              for i, (r, c) in enumerate(sorted(rules.items(), key=lambda x: -x[1])[:20], 1):
                  print(f'| {i} | `{r}` | {c} |')
              print()

          if cwes:
              print(f'### CWEs ({len(cwes)})')
              for c in sorted(cwes):
                  n = c.replace('CWE-', '')
                  print(f'- [{c}](https://cwe.mitre.org/data/definitions/{n}.html)')
              print()

          if files:
              print('### Top Files')
              print('| # | File | Count |')
              print('|---|------|-------|')
              for i, (f, c) in enumerate(sorted(files.items(), key=lambda x: -x[1])[:10], 1):
                  print(f'| {i} | `{f.split("/")[-1]}` | {c} |')
          PYEOF
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "[Code Scanning](/${GITHUB_REPOSITORY}/security/code-scanning) | SARIF in Artifacts tab" >> $GITHUB_STEP_SUMMARY
          else
            echo "No SARIF results found." >> $GITHUB_STEP_SUMMARY
          fi