# Workflow 이름
# GitHub Actions 실행 목록에서 보이는 이름
name: CodeQL (${{ github.event.repository.name }})

# Workflow 실행 조건
on: #이 워크플로우를 실행시키는 이벤트 목록
  # master 브랜치에 코드가 push될 때 실행
  push:
    branches: [ "master" ]

  # master 브랜치 대상으로 PR 생성/업데이트될 때 실행
  pull_request:
    branches: [ "master" ]

  # GitHub Actions UI에서 수동 실행 가능
  workflow_dispatch:
    inputs:
      profile:
        description: "internal | approval"
        required: true
        default: "internal"

  # cron 스케줄 실행 (매주 화요일 14:29 UTC)
  # 분  시  일  월  요일
  schedule:
    - cron: '29 14 * * 2'

jobs:
  analyze:
    # Job 이름 (Actions UI에서 표시)
    name: Static Code Analysis

    # 실행 환경 (GitHub에서 제공하는 Ubuntu runner 사용)
    # GitHub가 제공하는 Ubuntu Linux 서버에서 Job 실행
    # 보통 쓰는 서버
    runs-on: ubuntu-latest

    # 타임아웃 설정 (최대 30분 실행 후 중단)
    # 권장 타임
    timeout-minutes: 30

    # Workflow가 GitHub API에 접근할 때 필요한 권한
    # CodeQL workflow에서는 많이 사용하는 최소 권한(minimum permissions) 패턴
    permissions:
      # repository 코드 읽기 권한
      contents: read

      # Actions metadata 접근 권한
      actions: read

      # CodeQL query pack 또는 패키지 접근 권한
      packages: read

      # CodeQL 분석 결과(SARIF)를 GitHub Security 대시보드에 업로드하기 위한 권한
      security-events: write

    # GitHub Actions의 “Matrix 전략” 설정
    strategy:
      # 여러 언어 분석 시 하나 실패해도 나머지 계속 진행
      fail-fast: false

      # 분석 대상 언어 및 빌드 방식 정의
      matrix:
        include:
          # Java + Kotlin 코드 분석
          - language: java-kotlin

            # 빌드 모드
            # manual: 사용자가 직접 빌드 명령 실행
            build-mode: manual

    steps:
      # GitHub repository 코드를 runner 환경으로 가져옴
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "value=internal" >> $GITHUB_OUTPUT
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.profile }}" = "approval" ]; then
            echo "hide_rule_id=true" >> $GITHUB_OUTPUT
          else
            echo "hide_rule_id=false" >> $GITHUB_OUTPUT
          fi

      # Android/Gradle 프로젝트 빌드를 위한 JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          # OpenJDK 배포판
          distribution: temurin

          # 사용할 Java 버전
          java-version: "17"

          # Gradle dependency 캐싱 (빌드 속도 향상)
          cache: gradle

      # Android SDK 설치
      # Gradle 빌드 중 Android SDK가 필요한 경우 대비
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdkVersion 34에 필요한 SDK 플랫폼 설치
      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34"

      # CodeQL 분석 초기화 단계
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config-${{ steps.profile.outputs.value }}.yml

      # manual 빌드 모드일 경우 실행되는 빌드 단계
      - name: Build (Gradle)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          # gradlew 실행 권한 부여
          chmod +x ./gradlew
          # Android 프로젝트 빌드
          # assembleDebug는 APK 빌드 단계
          # build 또는 test로 변경 가능
          ./gradlew clean assembleDebug --no-daemon
      # CodeQL 분석 실행 단계
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # 언어별 결과 카테고리
          # GitHub Security → Code scanning에서 구분용으로 사용됨
          category: "/language:${{ matrix.language }}"

          # SARIF 결과 파일을 지정된 경로에 저장
          output: sarif-results

      # SARIF 파일을 Artifact로 업로드 → 다운로드 가능
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/**/*.sarif
          retention-days: 30

      # 분석 결과 요약을 Actions Summary에 출력
      - name: Generate Analysis Summary
        if: always()
        shell: bash
        run: |
          echo "## CodeQL Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ matrix.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Query Pack | security-and-quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${GITHUB_REF_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::8} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
            HIDE_RULE_ID="${{ steps.profile.outputs.hide_rule_id }}"
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, os, sys
          hide_rule_id = os.environ.get("HIDE_RULE_ID", "false").lower() == "true"
          sarif_path = os.popen("find sarif-results -name '*.sarif' -type f | head -1").read().strip()
          if not sarif_path:
              sys.exit(0)
          with open(sarif_path) as f:
              data = json.load(f)
          sev = {'error': 0, 'warning': 0, 'note': 0, 'none': 0}
          rules = {}
          cwes = set()
          files = {}
          for run in data.get('runs', []):
              tr = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
              for res in run.get('results', []):
                  lv = res.get('level', 'none')
                  sev[lv] = sev.get(lv, 0) + 1
                  rid = res.get('ruleId', '?')
                  if not hide_rule_id:
                      rules[rid] = rules.get(rid, 0) + 1
                  for loc in res.get('locations', []):
                      u = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                      if u: files[u] = files.get(u, 0) + 1
                  ri = tr.get(rid, {})
                  for t in ri.get('properties', {}).get('tags', []):
                      if t.startswith('external/cwe/cwe-'):
                          cwes.add(t.replace('external/cwe/', '').upper())
          tot = sum(sev.values())
          unique_rules = len({res.get('ruleId', '?') for run in data.get('runs', []) for res in run.get('results', [])}) if hide_rule_id else len(rules)
          print(f'### Summary')
          print(f'> **{tot}** findings | **{len(files)}** files | **{unique_rules}** rules | **{len(cwes)}** CWEs')
          print()
          print('| Severity | Count | % |')
          print('|----------|-------|---|')
          for lv in ['error','warning','note','none']:
              c = sev.get(lv, 0)
              p = c/tot*100 if tot else 0
              print(f'| {lv.upper()} | {c} | {p:.1f}% |')
          print(f'| **Total** | **{tot}** | |')
          print()
          if (not hide_rule_id) and rules:
              print('### Rules (Top 20)')
              print('| # | Rule | Count |')
              print('|---|------|-------|')
              for i,(r,c) in enumerate(sorted(rules.items(), key=lambda x:-x[1])[:20],1):
                  print(f'| {i} | `{r}` | {c} |')
              print()
          if cwes:
              print(f'### CWEs ({len(cwes)})')
              for c in sorted(cwes):
                  n = c.replace('CWE-','')
                  print(f'- [{c}](https://cwe.mitre.org/data/definitions/{n}.html)')
              print()
          if files:
              print('### Top Files')
              print('| # | File | Count |')
              print('|---|------|-------|')
              for i,(f,c) in enumerate(sorted(files.items(), key=lambda x:-x[1])[:10],1):
                  s = f.split('/')[-1]
                  print(f'| {i} | `{s}` | {c} |')
          PYEOF
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "[Code Scanning](/${{ github.repository }}/security/code-scanning) | SARIF in Artifacts tab" >> $GITHUB_STEP_SUMMARY
          else
            echo "No SARIF results found." >> $GITHUB_STEP_SUMMARY
          fi
        env:
          HIDE_RULE_ID: ${{ steps.profile.outputs.hide_rule_id }}